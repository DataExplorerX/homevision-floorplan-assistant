<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeVision — AI Floor Plan Assistant</title>
<style>
  :root {
    --bg: #f7f5f2;
    --panel: #ffffff;
    --accent: #1f3864;
    --accent-light: #e8edf5;
    --text: #222222;
    --muted: #666666;
    --border: #e2e2e2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }
  h1 {
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .chat-log {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }
  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.4;
    font-size: 14px;
  }
  .message.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .intent-badge {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 8px;
  }
  .result-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: white;
  }
  .result-card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    background: #fafafa;
    display: block;
  }
  .result-card-body {
    padding: 10px 12px;
  }
  .bhk-tag {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
  }
  .caption-text {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.35;
  }
  .input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  .input-row {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .loading { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <div class="app">
    <h1>HomeVision</h1>
    <div class="subtitle">Describe the home you're looking for — e.g. "a 2 bedroom apartment with a balcony"</div>
    <div class="chat-log" id="chatLog"></div>
  </div>

  <div class="input-bar">
    <div class="input-row">
      <input type="text" id="messageInput" placeholder="Describe what you're looking for..." />
      <button id="sendButton">Send</button>
    </div>
  </div>

<script>
const chatLog = document.getElementById('chatLog');
const messageInput = document.getElementById('messageInput');
const sendButton = document.getElementById('sendButton');

function addUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'message user';
  el.textContent = text;
  chatLog.appendChild(el);
  window.scrollTo(0, document.body.scrollHeight);
}

function addAssistantMessage({ parsed_intent, results }) {
  const el = document.createElement('div');
  el.className = 'message assistant';

  const badge = document.createElement('div');
  badge.className = 'intent-badge';
  const bhkPart = parsed_intent.bhk_filter ? `filter: ${parsed_intent.bhk_filter}` : 'no bedroom filter';
  badge.textContent = `Understood as: ${bhkPart} · looking for: "${parsed_intent.semantic_query}"`;
  el.appendChild(badge);

  if (results.length === 0) {
    const none = document.createElement('div');
    none.textContent = "No matching floor plans found.";
    el.appendChild(none);
  } else {
    const grid = document.createElement('div');
    grid.className = 'results-grid';
    results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <img src="${r.image_url}" alt="${r.bhk_label}" />
        <div class="result-card-body">
          <span class="bhk-tag">${r.bhk_label}</span>
          <div class="caption-text">${r.caption}</div>
        </div>
      `;
      grid.appendChild(card);
    });
    el.appendChild(grid);
  }

  chatLog.appendChild(el);
  window.scrollTo(0, document.body.scrollHeight);
}

function addLoadingMessage() {
  const el = document.createElement('div');
  el.className = 'message assistant loading';
  el.id = 'loadingMsg';
  el.textContent = 'Searching...';
  chatLog.appendChild(el);
  window.scrollTo(0, document.body.scrollHeight);
  return el;
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  addUserMessage(text);
  messageInput.value = '';
  sendButton.disabled = true;
  const loadingEl = addLoadingMessage();

  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await resp.json();
    loadingEl.remove();
    addAssistantMessage(data);
  } catch (err) {
    loadingEl.textContent = 'Something went wrong: ' + err.message;
  } finally {
    sendButton.disabled = false;
  }
}

sendButton.addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
